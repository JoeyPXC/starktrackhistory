
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jim Craig Stark County Track & Field Championships</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --card: #1c1c2e;
    --card-border: #2a2a3e;
    --red: #d62828;
    --red-dim: #8b1a1a;
    --blue: #1a56db;
    --blue-dim: #0f3282;
    --white: #f0f0f0;
    --muted: #888;
    --dimmer: #555;
    --gold: #c9a227;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scrollbar ─────────────────────────────────────────── */
  html { scrollbar-color: #333 var(--bg); scrollbar-width: thin; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }

  /* ── Hero ──────────────────────────────────────────────── */
  .hero {
    position: relative;
    background: #07070f;
    border-bottom: 3px solid var(--red);
    overflow: hidden;
    padding: 28px 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Stark County outline — subtle background geography */
  .hero-map {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0.04;
  }
  .hero-map svg { width: 420px; height: 420px; }

  .hero-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 780px;
  }

  .hero-logo {
    height: 110px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 18px rgba(214,40,40,0.35));
  }

  .hero-tagline {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .hero-stats {
    display: flex;
    gap: 28px;
    margin-top: 4px;
  }
  .hero-stat {
    text-align: center;
  }
  .hero-stat-val {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }
  .hero-stat-divider {
    width: 1px;
    background: var(--card-border);
    align-self: stretch;
  }

  /* ── Filter Bar ────────────────────────────────────────── */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 2px solid var(--card-border);
    padding: 12px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .filter-label {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--blue); color: var(--white); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
  .filter-btn.active-red { background: var(--red); border-color: var(--red); color: white; }

  .filter-divider { width: 1px; height: 28px; background: var(--card-border); }

  .filter-search {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 4px;
    outline: none;
    width: 160px;
    transition: border-color 0.15s;
  }
  .filter-search:focus { border-color: var(--blue); }
  .filter-search::placeholder { color: var(--dimmer); }

  /* ── Page Nav Tabs ─────────────────────────────────────── */
  .page-tabs {
    background: var(--surface);
    border-bottom: 2px solid var(--card-border);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .page-tabs::-webkit-scrollbar { display: none; }

  .page-tab {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 20px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .page-tab:hover { color: var(--white); }
  .page-tab.active { color: var(--white); border-bottom-color: var(--red); }

  /* ── Main Content ──────────────────────────────────────── */
  .content { max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── Section Header ────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
    margin-top: 32px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--white);
  }
  .section-subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .section-rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--card-border), transparent);
  }

  /* ── School Card ───────────────────────────────────────── */
  .school-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }
  .school-card:hover { border-color: #3a3a55; }

  .school-card-header {
    padding: 14px 18px;
    background: #16162a;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .school-color-bar {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .school-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    flex: 1;
  }

  .school-mascot {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .school-chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .school-card.collapsed .school-chevron { transform: rotate(-90deg); }
  .school-card.collapsed .school-card-body { display: none; }

  .school-card-body { overflow-x: auto; }

  /* ── Records Table ─────────────────────────────────────── */
  .records-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }
  .records-table th {
    background: #0f0f1e;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    position: sticky;
    top: 0;
  }
  .records-table th.center { text-align: center; }
  .records-table td {
    padding: 9px 12px;
    font-size: 13px;
    border-bottom: 1px solid #1e1e30;
    vertical-align: middle;
  }
  .records-table tr:last-child td { border-bottom: none; }
  .records-table tbody tr:hover td { background: #20203a; }

  .col-event { color: var(--muted); font-size: 12px; width: 130px; }
  .col-name { font-weight: 600; }
  .col-mark {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .col-mark.boys { color: var(--blue); }
  .col-mark.girls { color: var(--red); }
  .col-year {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    width: 54px;
  }

  .gender-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-width: 600px;
  }
  .gender-col { }
  .gender-col:first-child { border-right: 1px solid var(--card-border); }

  .gender-col-header {
    padding: 8px 14px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gender-col-header.boys { color: var(--blue); background: rgba(26,86,219,0.07); }
  .gender-col-header.girls { color: var(--red); background: rgba(214,40,40,0.07); }

  .gender-col-table { width: 100%; border-collapse: collapse; }
  .gender-col-table th {
    background: #0f0f1e;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dimmer);
    padding: 6px 10px;
    text-align: left;
  }
  .gender-col-table td {
    padding: 8px 10px;
    font-size: 12.5px;
    border-bottom: 1px solid #1a1a2e;
    vertical-align: middle;
  }
  .gender-col-table tr:last-child td { border-bottom: none; }
  .gender-col-table tbody tr:hover td { background: #1c1c30; }

  /* ── Top 25 Layout ─────────────────────────────────────── */
  .top25-event {
    margin-bottom: 32px;
  }
  .top25-event-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .top25-event-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .top25-rule {
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  .top25-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 600px) {
    .top25-split { grid-template-columns: 1fr; }
    .gender-split { grid-template-columns: 1fr; min-width: unset; }
    .gender-col:first-child { border-right: none; border-bottom: 1px solid var(--card-border); }
  }

  .top25-col {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .top25-col-header {
    padding: 9px 14px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .top25-col-header.boys { color: var(--blue); background: rgba(26,86,219,0.1); border-bottom: 1px solid rgba(26,86,219,0.2); }
  .top25-col-header.girls { color: var(--red); background: rgba(214,40,40,0.1); border-bottom: 1px solid rgba(214,40,40,0.2); }

  .top25-table { width: 100%; border-collapse: collapse; }
  .top25-table th {
    background: #0f0f1e;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dimmer);
    padding: 6px 10px;
    text-align: left;
  }
  .top25-table td {
    padding: 7px 10px;
    font-size: 12px;
    border-bottom: 1px solid #1a1a2e;
    vertical-align: middle;
  }
  .top25-table tr:last-child td { border-bottom: none; }
  .top25-table tbody tr:hover td { background: #1c1c30; }

  .rank-cell {
    color: var(--dimmer);
    font-size: 11px;
    font-family: var(--font-display);
    width: 28px;
    text-align: center;
  }
  .rank-cell.top3 {
    color: var(--gold);
    font-weight: 700;
  }
  .mark-cell {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    text-align: right;
  }
  .mark-cell.boys { color: var(--blue); }
  .mark-cell.girls { color: var(--red); }
  .school-cell {
    color: var(--muted);
    font-size: 11px;
  }
  .year-cell {
    color: var(--dimmer);
    font-size: 11px;
    text-align: right;
    white-space: nowrap;
  }
  .d2-badge {
    display: inline-block;
    font-size: 8px;
    background: rgba(201,162,39,0.15);
    color: var(--gold);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 3px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.5px;
    font-family: var(--font-display);
  }
  .perry-highlight td { background: rgba(26,86,219,0.06) !important; }
  .perry-highlight td:first-child { border-left: 2px solid var(--blue); }

  /* FAT tag */
  .fat-tag {
    font-size: 9px;
    color: var(--dimmer);
    margin-left: 3px;
    letter-spacing: 0;
    font-family: var(--font-body);
    font-weight: 400;
  }

  /* ── Loading / Empty ───────────────────────────────────── */
  .loading-msg {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--card-border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ────────────────────────────────────────────── */
  .footer {
    background: var(--surface);
    border-top: 2px solid var(--card-border);
    padding: 20px 20px;
    text-align: center;
    font-size: 11px;
    color: var(--dimmer);
    line-height: 1.8;
  }
  .footer a { color: var(--muted); text-decoration: none; }
  .footer a:hover { color: var(--white); }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 700px) {
    .filter-bar { gap: 8px; }
    .filter-search { width: 120px; }
    .hero-stats { gap: 16px; }
    .hero-stat-val { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- ── Hero ──────────────────────────────────────────────── -->
<header class="hero">
  <!-- Stark County outline (rough square with slightly irregular edges to evoke the real county shape) -->
  <div class="hero-map">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M28 22 L172 18 L175 88 L178 182 L24 178 L22 88 Z" stroke="white" stroke-width="3" fill="none"/>
      <path d="M28 22 L60 20 L60 8 L95 8" stroke="white" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
    </svg>
  </div>
  <div class="hero-inner">
    <img class="hero-logo" src="Stark_Logo_Transparent.png" alt="Jim Craig Stark County Championships" id="heroLogo">
    <p class="hero-tagline">All-Time Records &amp; County Leaderboards</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-val" id="statSchools">18</div>
        <div class="hero-stat-label">Schools</div>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <div class="hero-stat-val" id="statEvents">16</div>
        <div class="hero-stat-label">Events</div>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <div class="hero-stat-val" id="statYears">60+</div>
        <div class="hero-stat-label">Years of History</div>
      </div>
    </div>
  </div>
</header>

<!-- ── Page Tabs ──────────────────────────────────────────── -->
<nav class="page-tabs" id="pageTabs">
  <button class="page-tab active" data-page="records" onclick="switchPage('records')">School Records</button>
  <button class="page-tab" data-page="top25" onclick="switchPage('top25')">County Top 25</button>
</nav>

<!-- ── Filter Bar ─────────────────────────────────────────── -->
<div class="filter-bar" id="filterBar">
  <!-- populated by JS -->
</div>

<!-- ── Main Content ───────────────────────────────────────── -->
<main class="content" id="mainContent">
  <div class="loading-msg">
    <div class="loading-spinner"></div>
    Loading records…
  </div>
</main>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">
  Jim Craig Stark County Track &amp; Field Championships &nbsp;·&nbsp;
  Data maintained by Perry Track &amp; Field &nbsp;·&nbsp;
  School records updated automatically via Google Docs
</footer>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const SCHOOL_RECORDS_URL = 'https://docs.google.com/document/d/e/2PACX-1vT03xCGvstQRo2rEnp9D6ovTPsEnzR-G3OwBc4AjYwZ5kaEvYQ37nSK45Nu57SS9qAogKEgdOY_aG1H/pub';

// School colors for the accent bar
const SCHOOL_COLORS = {
  'Alliance':          '#003087',
  'Canton South':      '#cc0000',
  'Central Catholic':  '#8B0000',
  'East Canton':       '#ff6600',
  'Fairless':          '#006400',
  'GlenOak':           '#FFD700',
  'Hoover':            '#990000',
  'Jackson':           '#003399',
  'Lake':              '#003087',
  'Lake Center Christian': '#006400',
  'Louisville':        '#8B0000',
  'Marlington':        '#660000',
  'Massillon':         '#ff6600',
  'McKinley':          '#cc0000',
  'Minerva':           '#cc7700',
  'Northwest':         '#cc0000',
  'Perry':             '#000000',
  'Sandy Valley':      '#cc0000',
  'St. Thomas Aquinas':'#003087',
  'Tuslaw':            '#003087',
  'Timken':            '#cc0000',
  'Lehman':            '#003087',
  'Lincoln':           '#cc0000',
};

const SCHOOL_MASCOTS = {
  'Alliance': 'Aviators', 'Canton South': 'Wildcats', 'Central Catholic': 'Crusaders',
  'East Canton': 'Hornets', 'Fairless': 'Falcons', 'GlenOak': 'Golden Eagles',
  'Hoover': 'Vikings', 'Jackson': 'Polar Bears', 'Lake': 'Blue Streaks',
  'Lake Center Christian': 'Tigers', 'Louisville': 'Leopards', 'Marlington': 'Dukes',
  'Massillon': 'Tigers', 'McKinley': 'Bulldogs', 'Minerva': 'Lions',
  'Northwest': 'Indians', 'Perry': 'Panthers', 'Sandy Valley': 'Cardinals',
  'St. Thomas Aquinas': 'Knights', 'Tuslaw': 'Mustangs', 'Timken': 'Trojans',
  'Lehman': 'Polar Bears', 'Lincoln': 'Lions',
};

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let currentPage = 'records';
let schoolRecordsData = null;   // { schools: [{name, events:[{event,boys,girls}]}] }
let top25Data = null;            // loaded from the xlsx (hardcoded for now)
let filterGender = 'ALL';        // 'ALL' | 'M' | 'F'
let filterSchool = 'ALL';        // school name or 'ALL'
let filterEvent  = 'ALL';        // event name or 'ALL'
let searchQuery  = '';

// ─────────────────────────────────────────────────────────────
//  PAGE SWITCHING
// ─────────────────────────────────────────────────────────────
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.page === page);
  });
  renderFilterBar();
  renderContent();
}

// ─────────────────────────────────────────────────────────────
//  FILTER BAR
// ─────────────────────────────────────────────────────────────
function renderFilterBar() {
  const bar = document.getElementById('filterBar');

  if (currentPage === 'records') {
    // Gender + school filter + search
    const schools = schoolRecordsData
      ? schoolRecordsData.map(s => s.name).sort()
      : [];

    bar.innerHTML = `
      <span class="filter-label">Gender</span>
      <div class="filter-group">
        ${['ALL','M','F'].map(g => `
          <button class="filter-btn ${filterGender===g ? 'active':''}"
            onclick="setGender('${g}')">${g==='ALL'?'All':g==='M'?'Boys':'Girls'}</button>
        `).join('')}
      </div>
      <div class="filter-divider"></div>
      <span class="filter-label">School</span>
      <div class="filter-group" id="schoolBtns">
        <button class="filter-btn ${filterSchool==='ALL'?'active':''}" onclick="setSchool('ALL')">All</button>
        ${schools.map(s => `
          <button class="filter-btn ${filterSchool===s?'active':''}" onclick="setSchool('${s.replace(/'/g,"\\'")}')">
            ${s.replace('Canton ','').replace('Lake Center Christian','LCC')}
          </button>
        `).join('')}
      </div>
      <div class="filter-divider"></div>
      <input class="filter-search" type="text" placeholder="Search athlete…"
        value="${searchQuery}" oninput="setSearch(this.value)">
    `;
  } else {
    // Top 25: gender + event
    const events = TOP25_EVENTS.map(e => e.label);
    bar.innerHTML = `
      <span class="filter-label">Gender</span>
      <div class="filter-group">
        ${['ALL','M','F'].map(g => `
          <button class="filter-btn ${filterGender===g?'active':''}"
            onclick="setGender('${g}')">${g==='ALL'?'All':g==='M'?'Boys':'Girls'}</button>
        `).join('')}
      </div>
      <div class="filter-divider"></div>
      <span class="filter-label">Event</span>
      <div class="filter-group" style="overflow-x:auto;max-width:560px;flex-wrap:nowrap;">
        <button class="filter-btn ${filterEvent==='ALL'?'active':''}" onclick="setEvent('ALL')">All</button>
        ${events.map(e => `
          <button class="filter-btn ${filterEvent===e?'active':''}" onclick="setEvent('${e.replace(/'/g,"\\'")}')">
            ${e}
          </button>
        `).join('')}
      </div>
      <div class="filter-divider"></div>
      <input class="filter-search" type="text" placeholder="Search athlete…"
        value="${searchQuery}" oninput="setSearch(this.value)">
    `;
  }
}

function setGender(g)  { filterGender = g; renderFilterBar(); renderContent(); }
function setSchool(s)  { filterSchool = s; renderFilterBar(); renderContent(); }
function setEvent(e)   { filterEvent  = e; renderFilterBar(); renderContent(); }
function setSearch(v)  { searchQuery = v.toLowerCase(); renderContent(); }

// ─────────────────────────────────────────────────────────────
//  SCHOOL RECORDS — FETCH + PARSE
// ─────────────────────────────────────────────────────────────
async function loadSchoolRecords() {
  try {
    const res = await fetch(SCHOOL_RECORDS_URL);
    const html = await res.text();
    return parseSchoolRecordsHtml(html);
  } catch(e) {
    console.error('Failed to load school records:', e);
    return null;
  }
}

function parseSchoolRecordsHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const schools = [];

  // Each school is an <h1> followed by a <table>
  const h1s = doc.querySelectorAll('h1');
  h1s.forEach(h1 => {
    // School name is the text content
    let name = h1.textContent.trim();
    // Remove suffixes like "Aviators", "Polar Bears" etc — but we keep the full name
    // and look up the mascot separately

    // Find the next table sibling
    let el = h1.nextElementSibling;
    while (el && el.tagName !== 'TABLE' && el.tagName !== 'H1') {
      el = el.nextElementSibling;
    }
    if (!el || el.tagName !== 'TABLE') return;

    const events = [];
    const rows = el.querySelectorAll('tbody tr');
    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      if (cells.length < 4) return;
      const event = cells[0].textContent.trim();
      if (!event) return;

      const boysName  = cells[1].textContent.replace(/\n+/g,' ').trim();
      const boysMark  = cells[2].textContent.trim();
      const boysYear  = cells[3].textContent.trim();
      const girlsName = cells.length > 4 ? cells[4].textContent.replace(/\n+/g,' ').trim() : '';
      const girlsMark = cells.length > 5 ? cells[5].textContent.trim() : '';
      const girlsYear = cells.length > 6 ? cells[6].textContent.trim() : '';

      events.push({ event, boysName, boysMark, boysYear, girlsName, girlsMark, girlsYear });
    });

    if (events.length) {
      schools.push({ name, events });
    }
  });

  return schools;
}

// ─────────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────────
function renderContent() {
  const container = document.getElementById('mainContent');
  if (currentPage === 'records') {
    renderSchoolRecords(container);
  } else {
    renderTop25(container);
  }
}

// ── School Records ────────────────────────────────────────────
function renderSchoolRecords(container) {
  if (!schoolRecordsData) {
    container.innerHTML = `<div class="loading-msg"><div class="loading-spinner"></div>Loading school records…</div>`;
    return;
  }

  let schools = schoolRecordsData;
  if (filterSchool !== 'ALL') {
    schools = schools.filter(s => s.name === filterSchool);
  }
  if (searchQuery) {
    schools = schools.filter(s =>
      s.name.toLowerCase().includes(searchQuery) ||
      s.events.some(e =>
        e.boysName.toLowerCase().includes(searchQuery) ||
        e.girlsName.toLowerCase().includes(searchQuery)
      )
    );
  }

  if (!schools.length) {
    container.innerHTML = `<div class="loading-msg">No results found.</div>`;
    return;
  }

  container.innerHTML = schools.map(school => renderSchoolCard(school)).join('');

  // Wire up collapse toggles
  container.querySelectorAll('.school-card-header').forEach(h => {
    h.addEventListener('click', () => {
      h.closest('.school-card').classList.toggle('collapsed');
    });
  });
}

function renderSchoolCard(school) {
  const color = SCHOOL_COLORS[school.name] || '#555';
  const mascot = SCHOOL_MASCOTS[school.name] || '';

  let events = school.events;
  // Filter by gender display
  const showBoys  = filterGender !== 'F';
  const showGirls = filterGender !== 'M';

  const rows = events.map(e => {
    const boysHide  = !showBoys  || (e.boysMark  === '--' || !e.boysMark);
    const girlsHide = !showGirls || (e.girlsMark === '--' || !e.girlsMark);
    if (boysHide && girlsHide && filterGender !== 'ALL') return '';
    if (filterGender === 'ALL' && !e.boysMark && !e.girlsMark) return '';

    const boysHighlight = e.boysName.toLowerCase().includes(searchQuery) && searchQuery;
    const girlsHighlight = e.girlsName.toLowerCase().includes(searchQuery) && searchQuery;

    if (filterGender === 'M') {
      if (!e.boysMark || e.boysMark === '--') return '';
      return `<tr class="${boysHighlight?'perry-highlight':''}">
        <td class="col-event">${e.event}</td>
        <td class="col-name">${e.boysName}</td>
        <td class="col-mark boys">${e.boysMark}</td>
        <td class="col-year">${e.boysYear}</td>
      </tr>`;
    }
    if (filterGender === 'F') {
      if (!e.girlsMark || e.girlsMark === '--') return '';
      return `<tr class="${girlsHighlight?'perry-highlight':''}">
        <td class="col-event">${e.event}</td>
        <td class="col-name">${e.girlsName}</td>
        <td class="col-mark girls">${e.girlsMark}</td>
        <td class="col-year">${e.girlsYear}</td>
      </tr>`;
    }

    // ALL — side-by-side split
    return `<tr>
      <td class="col-event" style="border-right:1px solid #2a2a3e;">${e.event}</td>
      <td class="col-name" style="color:#b0b8d8;font-size:12px;">${showBoys?e.boysName:''}</td>
      <td class="col-mark boys">${showBoys&&e.boysMark!=='--'?e.boysMark:''}</td>
      <td class="col-year" style="border-right:1px solid #2a2a3e;">${showBoys&&e.boysMark!=='--'?e.boysYear:''}</td>
      <td class="col-name" style="color:#d8b0b8;font-size:12px;">${showGirls?e.girlsName:''}</td>
      <td class="col-mark girls">${showGirls&&e.girlsMark!=='--'?e.girlsMark:''}</td>
      <td class="col-year">${showGirls&&e.girlsMark!=='--'?e.girlsYear:''}</td>
    </tr>`;
  }).join('');

  if (!rows.trim()) return '';

  const headerCols = filterGender === 'ALL'
    ? `<th>Event</th><th>Boys Holder</th><th class="center">Boys Mark</th><th class="center">Year</th>
       <th>Girls Holder</th><th class="center">Girls Mark</th><th class="center">Year</th>`
    : `<th>Event</th><th>Record Holder</th><th class="center">Mark</th><th class="center">Year</th>`;

  return `
    <div class="school-card" id="school-${school.name.replace(/\s+/g,'-')}">
      <div class="school-card-header">
        <div class="school-color-bar" style="background:${color}"></div>
        <div>
          <div class="school-name">${school.name}</div>
          ${mascot ? `<div class="school-mascot">${mascot}</div>` : ''}
        </div>
        <span class="school-chevron">▼</span>
      </div>
      <div class="school-card-body">
        <table class="records-table">
          <thead><tr>${headerCols}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ── Top 25 ────────────────────────────────────────────────────
function renderTop25(container) {
  const events = filterEvent === 'ALL'
    ? TOP25_EVENTS
    : TOP25_EVENTS.filter(e => e.label === filterEvent);

  const showBoys  = filterGender !== 'F';
  const showGirls = filterGender !== 'M';

  const html = events.map(evt => {
    const boysData  = TOP25_DATA[evt.label]?.boys  || [];
    const girlsData = TOP25_DATA[evt.label]?.girls || [];

    const filterRows = (rows) => {
      if (!searchQuery) return rows;
      return rows.filter(r =>
        r.name.toLowerCase().includes(searchQuery) ||
        r.school.toLowerCase().includes(searchQuery)
      );
    };

    const boysRows  = filterRows(boysData);
    const girlsRows = filterRows(girlsData);

    if (!boysRows.length && !girlsRows.length) return '';

    const renderRows = (rows, gender) => rows.map(r => {
      const isPerry = r.school === 'Perry' || r.school === 'Perry ';
      const d2Html = r.d2 ? `<span class="d2-badge">D2</span>` : '';
      const nameParts = r.name.replace(/^\*/,'');
      const markParts = r.mark.replace(' FAT','');
      const hasFAT = r.mark.includes('FAT');

      return `<tr class="${isPerry?'perry-highlight':''}">
        <td class="rank-cell ${r.rank<=3?'top3':''}">${r.rank}</td>
        <td>${nameParts}${d2Html}</td>
        <td class="school-cell">${r.school}</td>
        <td class="mark-cell ${gender}">${markParts}${hasFAT?'<span class="fat-tag">FAT</span>':''}</td>
        <td class="year-cell">${r.year}</td>
      </tr>`;
    }).join('');

    const boysTable = boysRows.length ? `
      <div class="top25-col">
        <div class="top25-col-header boys">♂ Boys Top ${boysData.length <= 15?'15':'25'}</div>
        <table class="top25-table">
          <thead><tr><th>#</th><th>Athlete</th><th>School</th><th>Mark</th><th>Year</th></tr></thead>
          <tbody>${renderRows(boysRows,'boys')}</tbody>
        </table>
      </div>` : '';

    const girlsTable = girlsRows.length ? `
      <div class="top25-col">
        <div class="top25-col-header girls">♀ Girls Top ${girlsData.length <= 15?'15':'25'}</div>
        <table class="top25-table">
          <thead><tr><th>#</th><th>Athlete</th><th>School</th><th>Mark</th><th>Year</th></tr></thead>
          <tbody>${renderRows(girlsRows,'girls')}</tbody>
        </table>
      </div>` : '';

    const cols = [showBoys?boysTable:'', showGirls?girlsTable:''].filter(Boolean).join('');
    if (!cols) return '';

    const dataNote = !TOP25_DATA[evt.label]
      ? `<p style="color:var(--muted);font-size:12px;text-align:center;padding:16px;">Data coming soon for this event.</p>`
      : '';

    return `
      <div class="top25-event">
        <div class="top25-event-header">
          <div class="top25-event-name">${evt.label}</div>
          <div class="top25-rule"></div>
        </div>
        ${dataNote}
        <div class="top25-split">${cols}</div>
      </div>
    `;
  }).join('');

  container.innerHTML = html || `<div class="loading-msg">No results found.</div>`;
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
async function init() {
  renderFilterBar();

  schoolRecordsData = await loadSchoolRecords();
  if (schoolRecordsData) {
    document.getElementById('statSchools').textContent = schoolRecordsData.length;
    // count unique events
    const evts = new Set(schoolRecordsData.flatMap(s => s.events.map(e => e.event)));
    document.getElementById('statEvents').textContent = evts.size;
    renderFilterBar(); // re-render with school list
  }

  renderContent();
}

init();
</script>
